<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meme Agent</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body { background: #f0f2f5; font-family: 'Segoe UI', sans-serif; }
    .navbar-brand { font-weight: 700; font-size: 1.3rem; }
    .card { border: none; border-radius: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    .btn-primary { background: #6c47ff; border-color: #6c47ff; }
    .btn-primary:hover { background: #5535e0; border-color: #5535e0; }
    .badge-format { background: #e8e3ff; color: #6c47ff; font-weight: 500; }
    .loading-overlay { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.85);
      z-index: 9999; flex-direction: column; align-items: center; justify-content: center; }
    .loading-overlay.active { display: flex; }
    .spinner-lg { width: 3rem; height: 3rem; }
  </style>
</head>
<body>
  <nav class="navbar navbar-dark bg-dark mb-4 px-3">
    <a class="navbar-brand" href="/">🤖 Meme Agent</a>
  </nav>

  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner-border spinner-lg text-primary mb-3" role="status"></div>
    <p class="fw-semibold text-secondary" id="loadingMsg">Working on it…</p>
  </div>

  <div class="container pb-5">
    {% block content %}{% endblock %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    function showLoading(msg) {
      document.getElementById('loadingMsg').textContent = msg || 'Working on it…';
      document.getElementById('loadingOverlay').classList.add('active');
    }
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
